name: Build and Test

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  authorize:
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'external' || 'internal' }}
    runs-on: ubuntu-latest
    steps:
      - run: true

  build-test:
    uses: liquibase/build-logic/.github/workflows/os-extension-test.yml@main
    needs: authorize
    secrets: inherit
    with:
      java: "[17, 21, 25]"
      os: '["ubuntu-latest", "blacksmith-2vcpu-windows-2025"]'
      extraMavenArgs: 'verify'

  integration-tests:
    name: Java ${{ matrix.java }}, MySQL ${{ matrix.mysql }}, MariaDB ${{ matrix.mariadb }}
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 60
    strategy:
      matrix:
        java: [17, 21, 25]
        mysql: ["8.4"]
        mariadb: ["11.8"]
        include:
          # older mysql versions
          - java: "25"
            mysql: "8.0"
            mariadb: "11.8"
          # older mariadb versions
          - java: "25"
            mysql: "8.4"
            mariadb: "11.4"
          - java: "25"
            mysql: "8.4"
            mariadb: "10.11"
          - java: "25"
            mysql: "8.4"
            mariadb: "10.6"
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha || github.ref }}
    - name: Install Perl modules
      run: |
        sudo apt-get update
        sudo apt-get install libdbd-mysql-perl
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'maven'
    - name: Run Integration Tests With Maven
      shell: bash
      run: |
        ./mvnw --batch-mode --errors --no-transfer-progress --show-version \
            clean verify -Prun-its \
            -Dmysql_image=mysql:${{ matrix.mysql }} \
            -Dmariadb_image=mariadb:${{ matrix.mariadb }}

  dependabot-automerge:
    needs: integration-tests
    uses: liquibase/build-logic/.github/workflows/dependabot-automerge.yml@main
    secrets: inherit
